steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/virtual-mouse', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/virtual-mouse']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - virtual-mouse
      - --image=gcr.io/$PROJECT_ID/virtual-mouse
      - --platform=managed
      - --region=us-central1
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --port=8080

images:
  - 'gcr.io/$PROJECT_ID/virtual-mouse'
