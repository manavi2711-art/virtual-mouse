<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Mouse — Hand Gesture Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { margin-bottom: 16px; font-size: 1.5rem; color: #00e5a0; }
    #container { position: relative; width: 640px; max-width: 100%; }
    canvas { width: 100%; border-radius: 10px; border: 2px solid #333; display: block; }
    video { display: none; }
    #hud { margin-top: 12px; background: #1a1a1a; border-radius: 8px; padding: 14px 20px; width: 100%; }
    #gesture { font-size: 1.4rem; font-weight: bold; color: #00e5a0; }
    #fingers { margin-top: 8px; display: flex; gap: 10px; }
    .finger { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; background: #333; color: #aaa; transition: background 0.1s; }
    .finger.up { background: #00e5a0; color: #000; }
    #status { margin-top: 8px; font-size: 0.85rem; color: #888; }
    #startBtn { margin-top: 16px; padding: 10px 28px; background: #00e5a0; color: #000; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    #startBtn:disabled { background: #444; color: #888; cursor: default; }
  </style>
</head>
<body>
  <h1>🖐 Virtual Mouse — Hand Gesture Control</h1>
  <div id="container">
    <canvas id="canvas" width="640" height="480"></canvas>
    <video id="video" width="640" height="480" autoplay playsinline></video>
  </div>
  <div id="hud">
    <div id="gesture">Gesture: —</div>
    <div id="fingers">
      <div class="finger" id="f0">T</div>
      <div class="finger" id="f1">I</div>
      <div class="finger" id="f2">M</div>
      <div class="finger" id="f3">R</div>
      <div class="finger" id="f4">P</div>
    </div>
    <div id="status">Click Start to begin</div>
  </div>
  <button id="startBtn" onclick="start()">Start Camera</button>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const gestureEl = document.getElementById('gesture');
    const statusEl = document.getElementById('status');

    const TIP_IDS = [4, 8, 12, 16, 20];

    function fingersUp(lm) {
      if (!lm || lm.length < 21) return [];
      const f = [];
      f.push(lm[4].x < lm[3].x ? 1 : 0); // thumb
      for (let i = 1; i < 5; i++) f.push(lm[TIP_IDS[i]].y < lm[TIP_IDS[i]-2].y ? 1 : 0);
      return f;
    }

    function dist(a, b) {
      return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
    }

    function getGesture(lm) {
      if (!lm) return 'none';
      const f = fingersUp(lm);
      const key = f.join('');
      if (key === '01000') return 'move';
      if (key === '00001') return 'scroll_up';
      if (key === '10001') return 'scroll_down';
      if (key === '11111') return 'volume_control';
      if (key === '00000') return 'stop';
      if (key === '01100') return dist(lm[8], lm[12]) < 0.05 ? 'left_click' : 'move';
      if (key === '11000') return dist(lm[4], lm[8]) < 0.05 ? 'right_click' : 'idle';
      return 'idle';
    }

    const GESTURE_LABELS = {
      move: '🖱 Move', left_click: '👆 Left Click', right_click: '🖱 Right Click',
      scroll_up: '⬆ Scroll Up', scroll_down: '⬇ Scroll Down',
      volume_control: '🔊 Volume', stop: '✊ Stop', idle: '💤 Idle', none: '—'
    };

    let hands;

    async function start() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.textContent = 'Starting…';

      hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

      hands.onResults(results => {
        ctx.save();
        ctx.scale(-1, 1);
        ctx.translate(-canvas.width, 0);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        const lm = results.multiHandLandmarks?.[0];
        if (lm) {
          // Draw landmarks
          ctx.save();
          ctx.scale(-1, 1);
          ctx.translate(-canvas.width, 0);
          drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'#00e5a0', lineWidth:2});
          drawLandmarks(ctx, lm, {color:'#fff', lineWidth:1, radius:3});
          ctx.restore();
        }

        const f = fingersUp(lm);
        const gesture = getGesture(lm);
        gestureEl.textContent = 'Gesture: ' + (GESTURE_LABELS[gesture] || gesture);
        ['T','I','M','R','P'].forEach((_, i) => {
          document.getElementById('f'+i).classList.toggle('up', f[i] === 1);
        });
      });

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
        await video.play();

        let frameCount = 0;
        const camera = new Camera(video, {
          onFrame: async () => { if (++frameCount % 3 === 0) await hands.send({ image: video }); },
          width: 640, height: 480
        });
        camera.start();
        btn.textContent = 'Running…';
        statusEl.textContent = 'Processing locally in browser — no lag!';
      } catch(e) {
        statusEl.textContent = 'Camera error: ' + e.message;
        btn.disabled = false;
        btn.textContent = 'Start Camera';
      }
    }
  </script>
</body>
</html>
